{% extends 'base.html' %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}

<div class="card" style="max-width:600px;">
    <div class="card-header bg-primary text-white">
        <i class="bi bi-person-plus-fill me-2"></i>{{ title }}
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Patient Name *</label>
                    <input type="text" name="name" class="form-control"
                           value="{{ patient.name|default:'' }}" required placeholder="Full name">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Age *</label>
                    <input type="number" name="age" class="form-control"
                           value="{{ patient.age|default:'' }}" required min="0" max="150">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Gender *</label>
                    <select name="gender" class="form-select">
                        <option {% if patient.gender == 'Male' %}selected{% endif %}>Male</option>
                        <option {% if patient.gender == 'Female' %}selected{% endif %}>Female</option>
                        <option {% if patient.gender == 'Other' %}selected{% endif %}>Other</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Phone *</label>
                    <input type="text" name="phone" class="form-control"
                           value="{{ patient.phone|default:'' }}" required placeholder="03XX-XXXXXXX">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Blood Group *</label>
                    <select name="blood_group" class="form-select">
                        {% for bg in "A+,A-,B+,B-,O+,O-,AB+,AB-" %}
                        <option {% if patient.blood_group == bg %}selected{% endif %}>{{ bg }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Address</label>
                    <textarea name="address" class="form-control" rows="3"
                              placeholder="Home address">{{ patient.address|default:'' }}</textarea>
                </div>
            </div>
            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i>Save
                </button>
                <a href="{% url 'patient_list' %}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Back
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hospital Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0d3b6e 0%, #1a7a4a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-card .logo { text-align: center; margin-bottom: 24px; }
        .login-card .logo i { font-size: 3rem; color: #1a5276; }
        .login-card h3 { text-align: center; color: #1a3a5c; margin-bottom: 4px; }
        .login-card p { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 24px; }
        .form-control:focus { border-color: #1a5276; box-shadow: 0 0 0 0.2rem rgba(26,82,118,0.25); }
        .btn-login { background: #1a5276; border: none; width: 100%; padding: 12px; font-size: 1rem; border-radius: 8px; }
        .btn-login:hover { background: #0d3b6e; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo">
        <i class="bi bi-hospital-fill"></i>
    </div>
    <h3>Hospital HMS</h3>
    <p>Login karein apne account mein</p>

    {% if form.errors %}
    <div class="alert alert-danger">
        Username ya password galat hai!
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" name="username" class="form-control" placeholder="enter your name" required autofocus>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="enter your password" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary btn-login text-white">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login 
        </button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

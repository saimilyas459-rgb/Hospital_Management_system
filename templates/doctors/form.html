{% extends 'base.html' %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}

<div class="card" style="max-width:600px;">
    <div class="card-header bg-success text-white">
        <i class="bi bi-person-badge me-2"></i>{{ title }}
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Doctor ka Naam *</label>
                    <input type="text" name="name" class="form-control"
                           value="{{ doctor.name|default:'' }}" required placeholder="Poora naam">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Speciality *</label>
                    <select name="speciality" class="form-select">
                        {% for val, label in specialities %}
                        <option value="{{ val }}" {% if doctor.speciality == val %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Phone *</label>
                    <input type="text" name="phone" class="form-control"
                           value="{{ doctor.phone|default:'' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Email *</label>
                    <input type="email" name="email" class="form-control"
                           value="{{ doctor.email|default:'' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Consultation Fee (Rs.) *</label>
                    <input type="number" name="fee" class="form-control"
                           value="{{ doctor.fee|default:'' }}" required min="0">
                </div>
                <div class="col-md-6 d-flex align-items-end">
                    <div class="form-check">
                        <input type="checkbox" name="available" class="form-check-input"
                               id="available" {% if doctor.available or not doctor %}checked{% endif %}>
                        <label class="form-check-label fw-semibold" for="available">Available hai</label>
                    </div>
                </div>
            </div>
            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-success"><i class="bi bi-check-lg me-1"></i>Save Karein</button>
                <a href="{% url 'doctor_list' %}" class="btn btn-secondary"><i class="bi bi-arrow-left me-1"></i>Wapas</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block page_title %}Assign Bed{% endblock %}
{% block content %}
<div class="card" style="max-width:450px;">
    <div class="card-header text-white" style="background:#148f77;">
        <i class="bi bi-person-plus me-2"></i>Bed {{ bed.bed_no }} — {{ bed.ward.name }}
    </div>
    <div class="card-body">
        <p class="text-muted">Assign a patient to this bed or leave it vacant.</p>
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label fw-semibold">Patient (Leave blank to keep vacant)</label>
                <select name="patient" class="form-select">
                    <option value="">-- Vacant Bed --</option>
                    {% for p in patients %}
                    <option value="{{ p.id }}" {% if bed.patient_id == p.id %}selected{% endif %}>{{ p.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn text-white" style="background:#148f77;"><i class="bi bi-check-lg me-1"></i>Save</button>
                <a href="{% url 'bed_list' %}" class="btn btn-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

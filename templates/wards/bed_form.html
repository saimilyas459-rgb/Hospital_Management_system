{% extends 'base.html' %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="card" style="max-width:400px;">
    <div class="card-header text-white" style="background:#148f77;">
        <i class="bi bi-grid me-2"></i>{{ title }}
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Ward *</label>
                <select name="ward" class="form-select" required>
                    <option value="">-- Select Ward --</option>
                    {% for w in wards %}
                    <option value="{{ w.id }}">{{ w.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Bed Number *</label>
                <input type="text" name="bed_no" class="form-control" required placeholder="e.g. B-01, ICU-3">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn text-white" style="background:#148f77;"><i class="bi bi-check-lg me-1"></i>Save</button>
                <a href="{% url 'bed_list' %}" class="btn btn-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

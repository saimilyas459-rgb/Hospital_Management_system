{% extends 'base.html' %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="card" style="max-width:400px;">
    <div class="card-header text-white" style="background:#148f77;">
        <i class="bi bi-building me-2"></i>{{ title }}
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Ward Name *</label>
                <input type="text" name="name" class="form-control" required placeholder="e.g. Male Ward, ICU">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Capacity (Beds) *</label>
                <input type="number" name="capacity" class="form-control" required min="1">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn text-white" style="background:#148f77;"><i class="bi bi-check-lg me-1"></i>Save</button>
                <a href="{% url 'ward_list' %}" class="btn btn-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
